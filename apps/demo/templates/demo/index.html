<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LectoMLV - LLM Demo</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --primary: #6c5ce7;
      --primary-hover: #7f71eb;
      --accent: #00cec9;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --success: #00b894;
      --error: #e17055;
      --warning: #fdcb6e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 1.3rem;
      font-weight: 600;
    }
    header h1 span { color: var(--primary); }
    .tabs {
      display: flex;
      gap: 0.5rem;
    }
    .tab-btn {
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .tab-btn:hover { border-color: var(--primary); color: var(--text); }
    .tab-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .panel { display: none; }
    .panel.active { display: block; }

    .query-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .form-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .form-group { flex: 1; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    select, input[type="number"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
    }
    textarea {
      width: 100%;
      padding: 0.8rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    textarea:focus, select:focus { outline: none; border-color: var(--primary); }
    .btn {
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-accent { background: var(--accent); color: var(--bg); }
    .btn-accent:hover { opacity: 0.9; }
    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .result-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-header h3 { font-size: 1rem; }
    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .status-pending { background: var(--warning); color: var(--bg); }
    .status-processing { background: var(--primary); color: #fff; }
    .status-completed { background: var(--success); color: #fff; }
    .status-failed { background: var(--error); color: #fff; }
    .result-body { padding: 1.5rem; }
    .result-text {
      white-space: pre-wrap;
      line-height: 1.7;
      font-size: 0.95rem;
    }
    .segments-list { margin-top: 1rem; }
    .segment-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .segment-time {
      color: var(--accent);
      font-weight: 600;
      font-family: monospace;
      font-size: 0.9rem;
    }
    .segment-source { color: var(--text-muted); font-size: 0.85rem; }
    .segment-score {
      background: var(--primary);
      color: #fff;
      padding: 0.15rem 0.5rem;
      border-radius: 12px;
      font-size: 0.8rem;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .upload-area {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }
    .upload-area.dragover { border-color: var(--primary); }
    .upload-area p { color: var(--text-muted); margin-bottom: 1rem; }
    .manual-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .segment-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
      margin-bottom: 0.5rem;
      padding: 0.8rem;
      background: var(--bg);
      border-radius: 8px;
    }
    .segment-row input {
      padding: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }
    .segment-row input.time-input { width: 90px; text-align: center; }
    .segment-row textarea {
      flex: 1;
      min-height: 50px;
      font-size: 0.85rem;
      padding: 0.5rem;
    }
    .btn-sm {
      padding: 0.4rem 0.7rem;
      font-size: 0.85rem;
      border-radius: 6px;
    }
    .btn-danger { background: var(--error); color: #fff; border: none; cursor: pointer; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--text); }

    .lectures-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1.5rem;
    }
    .lectures-panel .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .lecture-card {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .lecture-card:hover { background: rgba(108,92,231,0.05); }
    .lecture-card:last-child { border-bottom: none; }
    .lecture-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .lecture-info h4 { font-size: 0.95rem; margin-bottom: 0.2rem; }
    .lecture-info p { color: var(--text-muted); font-size: 0.85rem; }
    .lecture-segments {
      display: none;
      margin-top: 0.8rem;
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .lecture-segments.open { display: block; }
    .lecture-seg-row {
      padding: 0.5rem 0.8rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      display: flex;
      gap: 0.8rem;
      align-items: flex-start;
    }
    .lecture-seg-row:last-child { border-bottom: none; }
    .lecture-seg-row:nth-child(even) { background: rgba(255,255,255,0.02); }
    .lecture-seg-time {
      color: var(--accent);
      font-family: monospace;
      font-size: 0.8rem;
      white-space: nowrap;
      min-width: 100px;
      padding-top: 0.15rem;
    }
    .lecture-seg-text {
      flex: 1;
      line-height: 1.5;
      color: var(--text);
    }
    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-indexed { background: var(--success); color: #fff; }
    .badge-pending { background: var(--warning); color: var(--bg); }
    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--text-muted);
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      font-size: 0.9rem;
      z-index: 1000;
      animation: slideIn 0.3s ease;
      max-width: 400px;
    }
    .toast-success { background: var(--success); color: #fff; }
    .toast-error { background: var(--error); color: #fff; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>
  <header>
    <h1><span>LectoMLV</span> LLM Demo</h1>
    <div class="tabs">
      <button class="tab-btn{% if not active_tab or active_tab == 'query' %} active{% endif %}" data-tab="query">LLM 쿼리</button>
      <button class="tab-btn" data-tab="upload">강의 업로드</button>
      <button class="tab-btn" data-tab="lectures">강의 목록</button>
    </div>
  </header>

  <main>
    <div id="panel-query" class="panel{% if not active_tab or active_tab == 'query' %} active{% endif %}">
      <form method="POST" action="/" class="query-form">
        {% csrf_token %}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
          <div style="display:flex;align-items:center;gap:0.5rem">
            <span style="background:var(--primary);color:#fff;padding:0.2rem 0.6rem;border-radius:6px;font-size:0.75rem;font-weight:700;letter-spacing:0.05em">POST</span>
            <span style="font-size:0.9rem;color:var(--text-muted);font-family:monospace">/api/llm/query/</span>
          </div>
        </div>

        {% if form_error %}
        <div style="background:var(--error);color:#fff;padding:0.8rem 1rem;border-radius:8px;margin-bottom:1rem;font-size:0.9rem">{{ form_error }}</div>
        {% endif %}

        <div class="form-row">
          <div class="form-group">
            <label>모델 선택 <code style="font-size:0.7rem;color:var(--accent)">model_name</code></label>
            <select name="model_name">
              {% for key, model_id in models.items %}
              <option value="{{ key }}" {% if form_data.model_name == key %}selected{% endif %}>{{ model_id }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>쿼리 유형 <code style="font-size:0.7rem;color:var(--accent)">query_type</code></label>
            <select name="query_type">
              <option value="search" {% if form_data.query_type == "search" %}selected{% endif %}>구간 검색</option>
              <option value="summary" {% if form_data.query_type == "summary" %}selected{% endif %}>요약</option>
              <option value="recommend" {% if form_data.query_type == "recommend" %}selected{% endif %}>추천</option>
            </select>
          </div>
          <div class="form-group">
            <label>대상 강의 <code style="font-size:0.7rem;color:var(--accent)">lecture_id</code></label>
            <select name="lecture_id">
              <option value="">전체 검색</option>
              {% for lec in lectures %}
              <option value="{{ lec.id }}" {% if form_data.lecture_id == lec.id|stringformat:"d" %}selected{% endif %}>{{ lec.title }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div style="margin-bottom:1rem">
          <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em">프롬프트 <code style="font-size:0.7rem;color:var(--accent)">query_text</code></label>
          <textarea name="prompt" placeholder="예: AutoCAD에서 Polygon 툴 사용법을 알려줘">{{ form_data.prompt|default:"" }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-query">프롬프트 입력</button>
      </form>

      <div id="result-area" class="result-box" style="display:{% if query_id %}block{% else %}none{% endif %}">
        <div class="result-header">
          <h3>응답 결과</h3>
          <div style="display:flex;gap:0.5rem;align-items:center">
            <span id="grounding-badge" class="status-badge" style="display:none"></span>
            <span id="result-status" class="status-badge status-pending">대기 중</span>
          </div>
        </div>
        <div class="result-body">
          <div id="result-text" class="result-text"><span class="spinner"></span>쿼리가 접수되었습니다. 결과를 기다리는 중...</div>
          <div id="grounding-detail" style="display:none;margin-top:1rem;padding:1rem;background:var(--bg);border:1px solid var(--border);border-radius:8px">
            <h4 style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.5rem">Grounding 검증 결과</h4>
            <div id="grounding-info"></div>
          </div>
          <div id="result-segments" class="segments-list"></div>
        </div>
      </div>
    </div>

    <div id="panel-upload" class="panel">
      <div class="upload-area" id="drop-zone">
        <p>JSON 파일을 드래그하거나 클릭하여 업로드</p>
        <p style="font-size:0.8rem;color:var(--text-muted);margin-top:-0.5rem">내부 형식 / 외부 형식(slides_data + materials) 자동 감지</p>
        <input type="file" id="file-input" accept=".json" style="display:none">
        <button class="btn btn-accent" onclick="document.getElementById('file-input').click()">파일 선택</button>
      </div>

      <div class="manual-form">
        <h3 style="margin-bottom:1rem;font-size:1rem">직접 입력</h3>
        <div class="form-row">
          <div class="form-group">
            <label>강의 제목</label>
            <input type="text" id="u-title" placeholder="인공지능과 기계학습 1강">
          </div>
          <div class="form-group">
            <label>원본 파일명</label>
            <input type="text" id="u-source" placeholder="p1 1. 인공지능과 기계학습.pdf">
          </div>
        </div>
        <div style="margin-bottom:1rem">
          <label style="display:block;font-size:0.8rem;color:var(--text-muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em">설명</label>
          <input type="text" id="u-desc" placeholder="강의 설명 (선택)" style="width:100%;padding:0.6rem 0.8rem;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem">
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem">
          <label style="font-size:0.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">구간 목록</label>
          <button class="btn btn-sm btn-ghost" onclick="addSegmentRow()">+ 구간 추가</button>
        </div>
        <div id="segments-container">
          <div class="segment-row">
            <input type="text" class="time-input seg-start" placeholder="00:00" value="00:01">
            <span style="color:var(--text-muted);padding-top:0.5rem">~</span>
            <input type="text" class="time-input seg-end" placeholder="00:00" value="01:36">
            <textarea class="seg-text" placeholder="STT 텍스트..."></textarea>
            <button class="btn btn-sm btn-danger" onclick="this.closest('.segment-row').remove()">삭제</button>
          </div>
        </div>
        <div style="margin-top:1rem">
          <button class="btn btn-primary" onclick="submitUpload()">업로드</button>
        </div>
      </div>
    </div>

    <div id="panel-lectures" class="panel">
      <div class="lectures-panel">
        <div class="header">
          <h3 style="font-size:1rem">등록된 강의</h3>
          <button class="btn btn-sm btn-ghost" onclick="loadLectures()">새로고침</button>
        </div>
        <div id="lectures-list">
          <div class="empty-state">강의 데이터가 없습니다.</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API = '';

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'lectures') loadLectures();
        if (btn.dataset.tab === 'query') loadLectureSelect();
      });
    });

    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = 'toast toast-' + type;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    async function fetchAllPages(url) {
      const all = [];
      let next = url;
      while (next) {
        const res = await fetch(next);
        const data = await res.json();
        all.push(...(data.results || []));
        next = data.next || null;
      }
      return all;
    }

    let pollTimer = null;

    {% if query_id %}
    document.addEventListener('DOMContentLoaded', function() {
      pollResult('{{ query_id }}');
    });
    {% endif %}

    function pollResult(queryId) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        try {
          const res = await fetch(API + '/api/llm/query/' + queryId + '/');
          const data = await res.json();
          setStatus(data.status);

          if (data.status === 'completed') {
            clearInterval(pollTimer);
            document.getElementById('result-text').innerHTML = formatAnswer(data.result_text || '(결과 없음)');
            renderSegments(data.retrieved_segments || []);
            renderGrounding(data.grounding || {});
          } else if (data.status === 'failed') {
            clearInterval(pollTimer);
            document.getElementById('result-text').textContent = '오류: ' + (data.error_message || '알 수 없는 오류');
          } else {
            document.getElementById('result-text').innerHTML =
              '<span class="spinner"></span>모델이 응답을 생성 중입니다... (' + data.status + ')';
          }
        } catch (e) {}
      }, 2000);
    }

    function setStatus(status) {
      const el = document.getElementById('result-status');
      el.textContent = { pending: '대기 중', processing: '처리 중', completed: '완료', failed: '실패' }[status] || status;
      el.className = 'status-badge status-' + status;
    }

    function formatAnswer(text) {
      return text.replace(/\[S(\d+)\]/g, '<span style="background:var(--primary);color:#fff;padding:0.1rem 0.4rem;border-radius:4px;font-size:0.8rem;font-weight:600;cursor:help" title="출처 S$1">[S$1]</span>');
    }

    function renderGrounding(grounding) {
      const badge = document.getElementById('grounding-badge');
      const detail = document.getElementById('grounding-detail');
      const info = document.getElementById('grounding-info');

      if (!grounding || grounding.verified === undefined) {
        badge.style.display = 'none';
        detail.style.display = 'none';
        return;
      }

      badge.style.display = 'inline-block';
      if (grounding.verified) {
        badge.textContent = 'Grounded ✓';
        badge.style.background = 'var(--success)';
        badge.style.color = '#fff';
      } else if (grounding.overall_grounded === false) {
        badge.textContent = 'Partially Grounded';
        badge.style.background = 'var(--warning)';
        badge.style.color = 'var(--bg)';
      } else {
        badge.textContent = 'Unverified';
        badge.style.background = 'var(--text-muted)';
        badge.style.color = '#fff';
      }

      detail.style.display = 'block';
      let html = `<div style="display:flex;gap:1.5rem;margin-bottom:0.5rem;font-size:0.85rem">
        <span>인용 수: <strong>${grounding.total_citations || 0}</strong></span>
        <span>미근거 문장: <strong style="color:${grounding.ungrounded_count > 0 ? 'var(--error)' : 'var(--success)'}">${grounding.ungrounded_count >= 0 ? grounding.ungrounded_count : '?'}</strong></span>
      </div>`;

      const details = grounding.verification_details || [];
      if (details.length) {
        html += '<div style="margin-top:0.5rem;font-size:0.83rem">';
        details.forEach(s => {
          const color = s.is_grounded ? 'var(--success)' : 'var(--error)';
          const icon = s.is_grounded ? '✓' : '✗';
          html += `<div style="padding:0.3rem 0;border-bottom:1px solid var(--border)">
            <span style="color:${color};font-weight:600">${icon}</span>
            <span style="color:var(--text-muted)">${(s.cited_sources||[]).map(c=>'['+c+']').join('')}</span>
            ${s.text ? s.text.substring(0, 80) + (s.text.length > 80 ? '...' : '') : ''}
          </div>`;
        });
        html += '</div>';
      }
      info.innerHTML = html;
    }

    function renderSegments(segments) {
      const container = document.getElementById('result-segments');
      if (!segments.length) { container.innerHTML = ''; return; }

      const cited = segments.filter(s => s.cited);
      const uncited = segments.filter(s => !s.cited);

      let html = '';
      if (cited.length) {
        html += '<h4 style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.5rem;margin-top:1rem">인용된 출처</h4>';
        html += cited.map(s => `
          <div class="segment-item" style="border-left:3px solid var(--success)">
            <div>
              <span style="background:var(--primary);color:#fff;padding:0.1rem 0.4rem;border-radius:4px;font-size:0.75rem;font-weight:600;margin-right:0.5rem">${s.citation_tag || ''}</span>
              <span class="segment-time">${s.start_time || '?'} ~ ${s.end_time || '?'}</span>
              <span class="segment-source">${s.source_file || ''}</span>
            </div>
            <span class="segment-score">${s.relevance_score ? (s.relevance_score * 100).toFixed(1) + '%' : '-'}</span>
          </div>
        `).join('');
      }
      if (uncited.length) {
        html += '<h4 style="font-size:0.85rem;color:var(--text-muted);margin-bottom:0.5rem;margin-top:1rem">검색되었으나 미인용</h4>';
        html += uncited.map(s => `
          <div class="segment-item" style="opacity:0.5">
            <div>
              <span style="background:var(--border);color:var(--text-muted);padding:0.1rem 0.4rem;border-radius:4px;font-size:0.75rem;font-weight:600;margin-right:0.5rem">${s.citation_tag || ''}</span>
              <span class="segment-time">${s.start_time || '?'} ~ ${s.end_time || '?'}</span>
              <span class="segment-source">${s.source_file || ''}</span>
            </div>
            <span class="segment-score">${s.relevance_score ? (s.relevance_score * 100).toFixed(1) + '%' : '-'}</span>
          </div>
        `).join('');
      }
      container.innerHTML = html;
    }

    function addSegmentRow() {
      const html = `
        <div class="segment-row">
          <input type="text" class="time-input seg-start" placeholder="00:00">
          <span style="color:var(--text-muted);padding-top:0.5rem">~</span>
          <input type="text" class="time-input seg-end" placeholder="00:00">
          <textarea class="seg-text" placeholder="STT 텍스트..."></textarea>
          <button class="btn btn-sm btn-danger" onclick="this.closest('.segment-row').remove()">삭제</button>
        </div>`;
      document.getElementById('segments-container').insertAdjacentHTML('beforeend', html);
    }

    async function submitUpload() {
      const title = document.getElementById('u-title').value.trim();
      const source = document.getElementById('u-source').value.trim();
      if (!title || !source) { toast('제목과 파일명을 입력하세요.', 'error'); return; }

      const rows = document.querySelectorAll('.segment-row');
      const segments = [];
      for (const row of rows) {
        const start = row.querySelector('.seg-start').value.trim();
        const end = row.querySelector('.seg-end').value.trim();
        const text = row.querySelector('.seg-text').value.trim();
        if (start && end && text) {
          segments.push({ start_time: start, end_time: end, transcript: text });
        }
      }
      if (!segments.length) { toast('최소 1개 이상의 구간을 입력하세요.', 'error'); return; }

      try {
        const res = await fetch(API + '/api/lectures/bulk-import/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title, source_file: source,
            description: document.getElementById('u-desc').value.trim(),
            segments
          }),
        });
        const data = await res.json();
        if (res.ok) {
          toast(`업로드 완료! ${data.segments_count}개 구간 등록됨`);
          document.getElementById('u-title').value = '';
          document.getElementById('u-source').value = '';
          document.getElementById('u-desc').value = '';
          document.getElementById('segments-container').innerHTML = `
            <div class="segment-row">
              <input type="text" class="time-input seg-start" placeholder="00:00">
              <span style="color:var(--text-muted);padding-top:0.5rem">~</span>
              <input type="text" class="time-input seg-end" placeholder="00:00">
              <textarea class="seg-text" placeholder="STT 텍스트..."></textarea>
              <button class="btn btn-sm btn-danger" onclick="this.closest('.segment-row').remove()">삭제</button>
            </div>`;
        } else {
          toast('업로드 실패: ' + JSON.stringify(data), 'error');
        }
      } catch (e) {
        toast('업로드 오류: ' + e.message, 'error');
      }
    }

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

    function handleFile(file) {
      if (!file.name.endsWith('.json')) { toast('JSON 파일만 업로드 가능합니다.', 'error'); return; }
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const data = JSON.parse(e.target.result);
          const btn = dropZone.querySelector('.btn');
          btn.disabled = true;
          btn.textContent = '업로드 중...';

          const res = await fetch(API + '/api/lectures/bulk-import/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
          });
          const result = await res.json();
          btn.disabled = false;
          btn.textContent = '파일 선택';

          if (res.ok) {
            if (result.total !== undefined) {
              toast(`${result.success}개 강의 (총 ${result.results.reduce((a,r) => a + (r.segments_count||0), 0)}개 구간) 임포트 완료!`);
              renderImportResult(result);
            } else {
              toast(`업로드 완료! ${result.segments_count}개 구간 등록됨`);
            }
          } else {
            toast('업로드 실패: ' + JSON.stringify(result), 'error');
          }
        } catch (err) {
          toast('JSON 파싱 오류: ' + err.message, 'error');
          const btn = dropZone.querySelector('.btn');
          btn.disabled = false;
          btn.textContent = '파일 선택';
        }
      };
      reader.readAsText(file);
    }

    function renderImportResult(result) {
      let html = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-top:1rem">
        <h3 style="font-size:1rem;margin-bottom:1rem">임포트 결과: ${result.success}/${result.total} 성공</h3>`;
      (result.results || []).forEach(r => {
        const ok = r.status === 'created';
        html += `<div style="padding:0.6rem 0.8rem;margin-bottom:0.4rem;background:var(--bg);border-radius:8px;border-left:3px solid ${ok ? 'var(--success)' : 'var(--error)'}">
          <strong>${r.title || r.source_file}</strong>
          <span style="color:var(--text-muted);font-size:0.85rem;margin-left:0.5rem">${r.source_file || ''}</span>
          <span style="float:right;font-size:0.85rem">${ok ? r.segments_count + '개 구간' : '실패'}</span>
        </div>`;
      });
      html += '</div>';
      dropZone.insertAdjacentHTML('afterend', html);
    }

    async function loadLectures() {
      const list = document.getElementById('lectures-list');
      list.innerHTML = '<div class="empty-state"><span class="spinner"></span> 강의 목록 불러오는 중...</div>';
      try {
        const lectures = await fetchAllPages(API + '/api/lectures/');
        if (!lectures.length) {
          list.innerHTML = '<div class="empty-state">등록된 강의가 없습니다.</div>';
          return;
        }
        list.innerHTML = `<div style="padding:0.5rem 1.5rem;color:var(--text-muted);font-size:0.85rem;border-bottom:1px solid var(--border)">총 ${lectures.length}개 강의 (클릭하여 구간 내용 확인)</div>` +
          lectures.map(l => `
          <div class="lecture-card" onclick="toggleSegments(this, ${l.id})">
            <div class="lecture-card-header">
              <div class="lecture-info">
                <h4>${l.title}</h4>
                <p>${l.source_file} · ${l.segment_count || 0}개 구간 · ${new Date(l.created_at).toLocaleDateString('ko-KR')}</p>
              </div>
              <span class="badge ${l.is_indexed ? 'badge-indexed' : 'badge-pending'}">${l.is_indexed ? '인덱싱 완료' : '인덱싱 대기'}</span>
            </div>
            <div class="lecture-segments" id="segs-${l.id}"></div>
          </div>
        `).join('');
      } catch (e) {
        list.innerHTML = '<div class="empty-state">로딩 실패</div>';
      }
    }

    async function toggleSegments(card, lectureId) {
      const container = document.getElementById('segs-' + lectureId);
      if (container.classList.contains('open')) {
        container.classList.remove('open');
        return;
      }

      if (container.dataset.loaded) {
        container.classList.add('open');
        return;
      }

      container.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--text-muted)"><span class="spinner"></span> 세그먼트 불러오는 중...</div>';
      container.classList.add('open');

      try {
        const segments = await fetchAllPages(API + '/api/lectures/' + lectureId + '/segments/');
        if (!segments.length) {
          container.innerHTML = '<div style="padding:0.8rem;text-align:center;color:var(--text-muted)">세그먼트 없음</div>';
        } else {
          container.innerHTML = segments.map((s, i) => `
            <div class="lecture-seg-row">
              <span style="color:var(--text-muted);font-size:0.75rem;min-width:25px">${i + 1}</span>
              <span class="lecture-seg-time">${s.start_time || '?'} ~ ${s.end_time || '?'}</span>
              <span class="lecture-seg-text">${escapeHtml(s.transcript || '')}</span>
            </div>
          `).join('');
        }
        container.dataset.loaded = '1';
      } catch (e) {
        container.innerHTML = '<div style="padding:0.8rem;color:var(--error)">로딩 실패</div>';
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
